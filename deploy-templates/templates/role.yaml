apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "user-settings-service-api.name" . }}-pod-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "user-settings-service-api.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]