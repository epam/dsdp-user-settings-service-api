apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "user-settings-service-api.name" . }}-pod-reader-binding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "user-settings-service-api.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "user-settings-service-api.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "user-settings-service-api.name" . }}-pod-reader
  apiGroup: rbac.authorization.k8s.io